name: CinemaBooking CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Spring Boot CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: CenimaBackend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Test backend
        run: mvn test

      - name: Build backend
        run: mvn clean package -DskipTests

  frontend:
    name: Frontend Vite React CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: CinemaBookingFrontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CinemaBookingFrontend/package-lock.json

      - name: Install frontend packages
        run: npm install

      - name: Build frontend
        run: npm run build

  deploy-render:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
