# APPLICATION
spring.application.name=CenimaBackend

# FIX RENDER
server.address=0.0.0.0
server.port=${PORT:8080}

# DATABASE - NEON POSTGRESQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HIKARICP - RENDER FRIENDLY
spring.datasource.hikari.pool-name=CinemaHikariPool
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# FIX RENDER + NEON
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.main.lazy-initialization=true

# REDIS - UPSTASH
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true
spring.data.redis.timeout=6000ms

spring.cache.type=redis
spring.cache.redis.time-to-live=60000

redisson.single-server-config.address=${REDISSON_ADDRESS}
redisson.single-server-config.password=${REDIS_PASSWORD}

spring.data.redis.lettuce.pool.max-active=3
spring.data.redis.lettuce.pool.max-idle=3
spring.data.redis.lettuce.pool.min-idle=1

# MVC
spring.mvc.throw-exception-if-no-handler-found=true

# FILE UPLOAD
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# SEAT LOCK
app.seat-lock.ttl-seconds=300

# FRONTEND
app.frontend-url=${FRONTEND_URL}

# ACTUATOR
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# LOGGING
logging.level.com.cinema=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# MOMO PAYMENT
payment.momo.endpoint=${MOMO_ENDPOINT}
payment.momo.partner-code=${MOMO_PARTNER_CODE}
payment.momo.access-key=${MOMO_ACCESS_KEY}
payment.momo.secret-key=${MOMO_SECRET_KEY}
payment.momo.notify-url=${MOMO_IPN_URL}
payment.momo.return-url=${MOMO_REDIRECT_URL}

# VNPAY
payment.vnpay.tmn-code=${VNPAY_TMN_CODE}
payment.vnpay.hash-secret=${VNPAY_HASH_SECRET}
payment.vnpay.pay-url=${VNPAY_PAY_URL}
payment.vnpay.return-url=${VNPAY_RETURN_URL}